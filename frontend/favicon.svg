  <!-- Inner Circuit Dots -->
  <circle cx="50" cy="50" r="8" fill="#ffffff" />
  <circle cx="30" cy="35" r="4" fill="#ffffff" />
  <circle cx="70" cy="65" r="4" fill="#ffffff" />
  
  <!-- Connectors -->
  <line x1="33" y1="37" x2="45" y2="45" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  <line x1="67" y1="63" x2="55" y2="55" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
</svg>
